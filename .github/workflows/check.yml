---
name: Crawl
'on':
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:

  Crawl:
    name: Crawl
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@main

      - name: Crawl the latest IPs list.
        run: |
          curl -fsSL https://developers.google.com/static/crawling/ipranges/common-crawlers.json -o googlebot.json
          curl -fsSL https://developers.google.com/static/crawling/ipranges/special-crawlers.json -o special-crawlers.json
          curl -fsSL https://developers.google.com/static/crawling/ipranges/user-triggered-fetchers.json -o user-triggered-fetchers.json

          jq -e '.prefixes | length > 0' googlebot.json >/dev/null
          jq -e '.prefixes | length > 0' special-crawlers.json >/dev/null
          jq -e '.prefixes | length > 0' user-triggered-fetchers.json >/dev/null

      - name: Separate into different formats and types.
        run: |
          jq -r '.prefixes[] | .ipv4Prefix // empty' googlebot.json > "ipv4.txt"
          jq -r '.prefixes[] | .ipv4Prefix // empty' special-crawlers.json >> "ipv4.txt"
          jq -r '.prefixes[] | .ipv4Prefix // empty' user-triggered-fetchers.json >> "ipv4.txt"

          jq -r '.prefixes[] | .ipv6Prefix // empty' googlebot.json > "ipv6.txt"
          jq -r '.prefixes[] | .ipv6Prefix // empty' special-crawlers.json >> "ipv6.txt"
          jq -r '.prefixes[] | .ipv6Prefix // empty' user-triggered-fetchers.json >> "ipv6.txt"

          test -s "ipv4.txt"
          test -s "ipv6.txt"

      - name: Create Pull Request.
        if: github.event_name != 'pull_request'
        id: cpr
        run: |
          set -x
          if ! git diff --quiet; then
              git branch automatic_crawl
              git switch automatic_crawl
              git config user.email "${{ github.actor }}@users.noreply.github.com"
              git config user.name "${{ github.actor }}"
              git commit -a -m "Automatic Crawl"
              git push --force -u origin automatic_crawl
              PR_NUMBER=$(gh pr list --head automatic_crawl --json number --jq '.[0].number')
              if [ -n "${PR_NUMBER}" ]; then
                  echo "pull-request-operation=updated" >> $GITHUB_OUTPUT
                  echo "pull-request-number=${PR_NUMBER}" >> $GITHUB_OUTPUT
              else
                  gh pr create --fill
                  PR_NUMBER=$(gh pr list --head automatic_crawl --json number --jq '.[0].number')
                  echo "pull-request-operation=created" >> $GITHUB_OUTPUT
                  echo "pull-request-number=${PR_NUMBER}" >> $GITHUB_OUTPUT
              fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Automerge if only json files have been changed
        if: |
          steps.cpr.outputs.pull-request-operation == 'created' ||
          steps.cpr.outputs.pull-request-operation == 'updated'
        run: |
          if [[ ! $(git diff automatic_crawl..main --name-only | grep -vE "googlebot.json|special-crawlers.json|user-triggered-fetchers.json") ]]; then
              gh pr merge --merge --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
